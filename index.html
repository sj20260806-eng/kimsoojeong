<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 미디어아트 포트폴리오</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 24px;
      background: #f8f9fa;
      font-family: 'Malgun Gothic', sans-serif;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    header p {
      font-size: 1rem;
      color: #7f8c8d;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 800px;
      gap: 24px;
    }

    #projects .cell {
      aspect-ratio: 16 / 11;
      position: relative;
      overflow: hidden;
      border: 2px solid #3498db;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
    }

    .cell-title {
      background: #2c3e50;
      color: #ffffff;
      padding: 8px;
      font-size: 0.9rem;
      text-align: center;
      font-weight: bold;
    }

    #projects .cell iframe {
      width: 100%;
      height: calc(100% - 34px);
      border: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>p5.js 비주얼 포트폴리오</h1>
    <p>정적 작품(과제 1, 2) ➔ 동적 작품(과제 3, 4) 순서 배치</p>
  </header>

  <main id="projects">

    <div class="cell">
      <div class="cell-title">과제 1 (정적 작품)</div>
      <iframe src="sample1/index.html"></iframe>
    </div>

    <div class="cell">
      <div class="cell-title">과제 4 (동적 작품)</div>
      <iframe src="sample4/index.html"></iframe>
    </div>

    <div class="cell">
      <div class="cell-title">과제 2 (정적 작품)</div>
      <iframe src="sample2/index.html"></iframe>
    </div>

    <div class="cell">
      <div class="cell-title">과제 3 (동적 작품)</div>
      <iframe src="sample3/index.html"></iframe>
    </div>

  </main>

</body>
</html>
